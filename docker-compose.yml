version: "3.9"

networks:
  jtl-net:
    driver: bridge

volumes:
  redis_data:
    name: backend_redis_data

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --requirepass jtlredis2024 --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks: [jtl-net]
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "jtlredis2024", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nestjs-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
      PG_HOST: kuzj.your-database.de
      PG_PORT: 5432
      PG_DATABASE: jtl_dash_db
      PG_USER: jtl_sa_dash
      PG_PASSWORD: "t9)ALcrzXJ%o"
      PG_SSL: "true"
      PG_POOL_MAX: 20
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: jtlredis2024
    networks: [jtl-net]
    expose:
      - "3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='x-api-version: 1' http://127.0.0.1:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nextjs-frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    networks: [jtl-net]
    depends_on:
      - nestjs-api
    expose:
      - "3000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks: [jtl-net]
    depends_on:
      - nextjs-frontend
      - nestjs-api
