version: "3.9"

networks:
  jtl-net:
    driver: bridge

volumes:
  redis_data:
    name: backend_redis_data

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    env_file: ./backend/.env
    command: /bin/sh -c 'redis-server --requirepass "$${REDIS_PASSWORD}" --maxmemory 512mb --maxmemory-policy allkeys-lru'
    volumes:
      - redis_data:/data
    networks: [jtl-net]
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  nestjs-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: ./backend/.env
    networks: [jtl-net]
    expose:
      - "3001"
    ports:
      - "127.0.0.1:3001:3001"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- --header='x-api-version: 1' http://127.0.0.1:3001/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  nextjs-frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: /api
    networks: [jtl-net]
    depends_on:
      - nestjs-api
    expose:
      - "3000"
    ports:
      - "127.0.0.1:3000:3000"
