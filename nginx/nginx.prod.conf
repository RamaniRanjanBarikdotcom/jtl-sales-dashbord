# Step 1 nginx config — HTTP only, used BEFORE SSL cert is issued.
# After running certbot, replace this with the HTTPS block below.

# ── HTTP (redirect + certbot challenge) ──────────────────────────────────────
server {
    listen 80;
    server_name _;

    # Let certbot verify domain ownership
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

