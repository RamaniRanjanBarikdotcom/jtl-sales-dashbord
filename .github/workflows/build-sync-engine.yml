name: Build WPF Sync Engine

on:
  push:
    paths:
      - 'sync-engine-dotnet/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore sync-engine-dotnet/JtlSyncEngine/JtlSyncEngine.csproj

      - name: Publish
        run: >
          dotnet publish sync-engine-dotnet/JtlSyncEngine/JtlSyncEngine.csproj
          -c Release
          -r win-x64
          --self-contained true
          -p:PublishSingleFile=true
          -p:IncludeNativeLibrariesForSelfExtract=true
          -o publish/JtlSyncEngine

      - name: Delete old artifacts to free quota
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'JtlSyncEngine-win-x64',
              per_page: 100,
            });
            for (const artifact of artifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              core.info(`Deleted artifact ${artifact.id} (${artifact.name}, ${(artifact.size_in_bytes/1024/1024).toFixed(1)} MB)`);
            }

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JtlSyncEngine-win-x64
          path: publish/JtlSyncEngine/
          retention-days: 7
