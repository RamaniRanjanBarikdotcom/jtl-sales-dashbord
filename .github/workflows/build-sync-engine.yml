name: Build WPF Sync Engine

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  actions: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Delete old artifacts
        uses: actions/github-script@v8
        continue-on-error: true
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'JtlSyncEngine-win-x64',
              per_page: 100,
            });
            for (const artifact of artifacts) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              core.info(`Deleted ${artifact.id} (${(artifact.size_in_bytes/1024/1024).toFixed(1)} MB)`);
            }

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore sync-engine-dotnet/JtlSyncEngine/JtlSyncEngine.csproj

      - name: Publish
        run: dotnet publish sync-engine-dotnet/JtlSyncEngine/JtlSyncEngine.csproj -c Release -o publish/JtlSyncEngine

      - name: Zip output
        run: Compress-Archive -Path publish/JtlSyncEngine/* -DestinationPath JtlSyncEngine-win-x64.zip

      # Intentionally skip Actions artifact upload:
      # free-tier artifact storage quota can block uploads with:
      # "Failed to CreateArtifact: Artifact storage quota has been hit".
      # We publish directly to GitHub Releases below instead.

      - name: Publish to GitHub Release (permanent download)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: sync-engine-latest
          name: "JTL Sync Engine — Latest Build"
          body: |
            Built automatically from the latest commit on `main`.
            Download `JtlSyncEngine-win-x64.zip`, extract it, and run `JtlSyncEngine.exe`.
          prerelease: true
          files: JtlSyncEngine-win-x64.zip
