name: Build WPF Sync Engine

on:
  push:
    paths:
      - 'sync-engine-dotnet/**'
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore
        run: dotnet restore sync-engine-dotnet/JtlSyncEngine/JtlSyncEngine.csproj

      - name: Publish
        run: >
          dotnet publish sync-engine-dotnet/JtlSyncEngine/JtlSyncEngine.csproj
          -c Release
          -r win-x64
          --self-contained false
          -o publish/JtlSyncEngine

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: JtlSyncEngine-win-x64
          path: publish/JtlSyncEngine/
          retention-days: 30
