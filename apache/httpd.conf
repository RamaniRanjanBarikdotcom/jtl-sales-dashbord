ServerName localhost
ServerTokens Prod
ServerSignature Off

LoadModule proxy_module modules/mod_proxy.so
LoadModule proxy_http_module modules/mod_proxy_http.so
LoadModule proxy_wstunnel_module modules/mod_proxy_wstunnel.so
LoadModule rewrite_module modules/mod_rewrite.so
LoadModule deflate_module modules/mod_deflate.so
LoadModule headers_module modules/mod_headers.so
LoadModule expires_module modules/mod_expires.so

Listen 80

<VirtualHost *:80>

    # ── Security Headers ──────────────────────────────────────────────────────
    Header always set X-Frame-Options "DENY"
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
    Header always set Content-Security-Policy "default-src 'self'; img-src 'self' data: https:; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https:; connect-src 'self' https: wss:; font-src 'self' data: https:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'"

    # ── Compression ───────────────────────────────────────────────────────────
    AddOutputFilterByType DEFLATE text/plain text/css application/json application/javascript text/javascript

    # ── API → NestJS backend ──────────────────────────────────────────────────
    ProxyPreserveHost On
    ProxyPass        /api/ http://nestjs-api:3001/api/
    ProxyPassReverse /api/ http://nestjs-api:3001/api/

    # ── Static assets — cache 1 year ─────────────────────────────────────────
    <LocationMatch "\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$">
        ProxyPass        http://nextjs-frontend:3000
        ProxyPassReverse http://nextjs-frontend:3000
        ExpiresActive On
        ExpiresDefault "access plus 1 year"
        Header set Cache-Control "public, immutable"
    </LocationMatch>

    # ── WebSocket support (Next.js HMR / hot reload) ──────────────────────────
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade} websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade [NC]
    RewriteRule ^/?(.*) "ws://nextjs-frontend:3000/$1" [P,L]

    # ── Frontend → Next.js ────────────────────────────────────────────────────
    ProxyPass        / http://nextjs-frontend:3000/
    ProxyPassReverse / http://nextjs-frontend:3000/

    # No caching on HTML pages
    <LocationMatch "\.html$">
        Header set Cache-Control "no-cache, no-store, must-revalidate"
        Header set Pragma "no-cache"
        Header set Expires "0"
    </LocationMatch>

</VirtualHost>
